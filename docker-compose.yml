services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: diablogram
      POSTGRES_PASSWORD: diablogram
      POSTGRES_DB: diablogram
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U diablogram"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build: .
    command: alembic upgrade head
    env_file: .env
    depends_on:
      db:
        condition: service_healthy

  web:
    build: .
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      # Bound to localhost only — nginx on the host is the public entrypoint
      # (reverse proxy + TLS + Basic Auth). Never publish this on 0.0.0.0.
      - "127.0.0.1:8000:8000"
    env_file: .env
    volumes:
      - ./sessions:/app/sessions
    depends_on:
      migrate:
        condition: service_completed_successfully

  worker:
    build: .
    restart: unless-stopped
    command: python -m app.worker
    env_file: .env
    volumes:
      - ./sessions:/app/sessions
    depends_on:
      migrate:
        condition: service_completed_successfully

volumes:
  db_data:
